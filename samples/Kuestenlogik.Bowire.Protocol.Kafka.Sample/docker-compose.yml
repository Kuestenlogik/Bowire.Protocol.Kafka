# Single-node Kafka in KRaft mode — no Zookeeper, no Schema Registry,
# no auth. Boots in a few seconds and exposes :9092 to the host so the
# sample app (and Bowire) can connect at kafka://localhost:9092.
#
# A tiny Kafka UI on :8080 is included so you can sanity-check that
# the topics exist; remove the `kafka-ui` service if you don't want it.

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: bowire-kafka-sample
    ports:
      - "9092:9092"
    environment:
      # KRaft single-node — broker + controller in one process.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      # Single-node defaults — replication factors must be 1.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Stable cluster id so a `docker compose down && up` reuses the
      # same KRaft metadata volume.
      CLUSTER_ID: "bowire-sample-cluster"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: bowire-kafka-sample-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "bowire-sample"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"
